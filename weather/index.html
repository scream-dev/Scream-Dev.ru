<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 16px;
        }

        .message {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .new-domain {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin: 16px 0;
            word-break: break-all;
        }

        .redirect-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            margin-top: 16px;
        }

        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .redirect-btn:active {
            transform: translateY(0);
        }

        .auto-redirect-info {
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 24px;
            }
            .message {
                font-size: 16px;
            }
            .new-domain {
                font-size: 16px;
                padding: 6px 16px;
            }
        }
    </style>
    <meta http-equiv="refresh" content="0; url=https://weather.scream-dev.ru">
</head>
<body>
    <div class="card">
        <h1>🚀 Website Moved</h1>
        <div class="message">
            The site has moved to a new domain:
        </div>
        <div class="new-domain">
            weather.scream-dev.ru
        </div>
        <div class="message">
            I recommend going directly to the new domain and bypassing the old one.
        </div>
        <div class="message">
            If you are not redirected automatically, click the button below:
        </div>
        <button class="redirect-btn" onclick="redirectToNewSite()">
            Go to New Website →
        </button>
        <div class="auto-redirect-info">
            ⚡ Redirecting instantly...
        </div>
    </div>

    <script>
        // Instant redirect
        window.location.href = "https://weather.scream-dev.ru";
        
        function redirectToNewSite() {
            window.location.href = "https://weather.scream-dev.ru";
        }
    </script>
</body>
</html>
